<!-- CT Forwarding — WHITE variant (hero, dark nav, footer) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" role="img" aria-label="CT Forwarding and Transport">
  <defs>
    <clipPath id="arrowClipW">
      <path d="M 68,62 L 566,62 L 724,390 L 566,718 L 68,718 L 200,390 Z"/>
    </clipPath>
  </defs>

  <!-- Ghost shadow for depth on dark bg -->
  <path
    d="M 126,120 L 624,120 L 782,448 L 624,776 L 126,776 L 258,448 Z"
    fill="rgba(255,255,255,0.10)"
  />

  <!-- Arrow: transparent fill, white stroke -->
  <path
    d="M 68,62 L 566,62 L 724,390 L 566,718 L 68,718 L 200,390 Z"
    fill="rgba(255,255,255,0.05)"
    stroke="#FFFFFF"
    stroke-width="17"
    stroke-linejoin="miter"
  />

  <text
    x="418"
    y="390"
    font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
    font-size="300"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="14"
    fill="#FFFFFF"
    clip-path="url(#arrowClipW)"
  >CT</text>
</svg>
